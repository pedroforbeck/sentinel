spring.datasource.url=jdbc:postgresql://localhost:15432/sentinel
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

sentinel.api.key=your-secret-key

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,flyway,loggers,env
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.info.env.enabled=true

info.app.name=Sentinel API
info.app.version=0.0.1

management.metrics.tags.application=sentinel-api
