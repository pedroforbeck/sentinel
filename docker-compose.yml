version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sentinel-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: sentinel_db
    ports:
      - "15432:5432" # Mapping to localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: